name: build

# net48 项目 + Costura.Fody。CI 用 .NET 8 SDK 当构建工具就够了,
# 目标框架仍是 net48,产物 = 单文件 VoidTidy.exe。
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# softprops/action-gh-release 需要写权限才能创建/更新 Release;
# 默认 GITHUB_TOKEN 是只读,所以 tag 触发时会 "Resource not accessible by integration"。
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/DockBar/DockBar.csproj

      - name: Build (Release)
        run: dotnet build src/DockBar/DockBar.csproj -c Release --no-restore

      - name: Publish single-file (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet publish src/DockBar/DockBar.csproj -c Release

      - name: Upload artifact (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: VoidTidy-win
          path: src/DockBar/publish/VoidTidy.exe

      - name: Create GitHub Release (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src/DockBar/publish/VoidTidy.exe
          generate_release_notes: true
