name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/DockBar/DockBar.csproj

      - name: Build (Release)
        run: dotnet build src/DockBar/DockBar.csproj -c Release --no-restore

      - name: Publish single-file (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet publish src/DockBar/DockBar.csproj `
            -c Release -r win-x64 `
            /p:_IsPublishing=true `
            -o publish

      - name: Upload artifact (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: DockBar-win-x64
          path: publish/DockBar.exe

      - name: Create GitHub Release (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/DockBar.exe
          generate_release_notes: true
